apiVersion: v1
kind: Service
metadata:
  name: {{ include "webrust.fullname" . }}-postgres
  labels:
    {{- include "webrust.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "webrust.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: {{ .Values.database.port }}
      targetPort: postgres
