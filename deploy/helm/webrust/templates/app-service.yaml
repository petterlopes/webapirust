apiVersion: v1
kind: Service
metadata:
  name: {{ include "webrust.fullname" . }}
  labels:
    {{- include "webrust.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "webrust.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
